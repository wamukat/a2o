services:
  a2o-runtime:
    image: ${A2O_RUNTIME_IMAGE:-ghcr.io/wamukat/a2o-engine:latest}
    working_dir: /workspace
    environment:
      A2O_ROOT_DIR: /workspace
    volumes:
      - ${A2O_WORKSPACE_ROOT:-../../..}:/workspace
      - ${A2O_HOST_WORKSPACE_ROOT:-../../..}:${A2O_HOST_WORKSPACE_ROOT:-/workspace-host}
      - a2o-runtime-state:/var/lib/a2o
    ports:
      - "${A2O_BUNDLE_AGENT_PORT:-7393}:7393"
    command: ["sleep", "infinity"]
    restart: unless-stopped

  kanbalone:
    image: ${KANBALONE_IMAGE:-ghcr.io/wamukat/kanbalone:v0.9.34}
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      KANBALONE_DB_FILE: /app/data/kanbalone.sqlite
    ports:
      - "${A2O_BUNDLE_KANBALONE_PORT:-3470}:3000"
    volumes:
      - kanbalone-data:/app/data
    restart: unless-stopped

volumes:
  a2o-runtime-state:
  kanbalone-data:
