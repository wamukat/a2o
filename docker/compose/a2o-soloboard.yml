services:
  a2o-runtime:
    build:
      context: ../..
      dockerfile: docker/a3-runtime/Dockerfile
    working_dir: /workspace
    environment:
      A3_ROOT_DIR: /workspace
      A2O_ROOT_DIR: /workspace
    volumes:
      - ${A2O_WORKSPACE_ROOT:-../../..}:/workspace
      - ${A2O_HOST_WORKSPACE_ROOT:-../../..}:${A2O_HOST_WORKSPACE_ROOT:-/workspace-host}
      - a2o-runtime-state:/var/lib/a2o
    ports:
      - "${A2O_BUNDLE_AGENT_PORT:-7393}:7393"
    command: ["sleep", "infinity"]
    restart: unless-stopped

  soloboard:
    image: ${KANBALONE_IMAGE:-${SOLOBOARD_IMAGE:-ghcr.io/wamukat/kanbalone:v0.9.19}}
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      KANBALONE_DB_FILE: /app/data/soloboard.sqlite
    ports:
      - "${A2O_BUNDLE_KANBALONE_PORT:-${A2O_BUNDLE_SOLOBOARD_PORT:-3470}}:3000"
    volumes:
      - soloboard-data:/app/data
    restart: unless-stopped

volumes:
  a2o-runtime-state:
  soloboard-data:
