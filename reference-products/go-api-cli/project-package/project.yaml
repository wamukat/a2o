project: a2o-reference-go-api-cli
kanban:
  provider: soloboard
  project: A2OReferenceGo
  bootstrap: kanban/bootstrap.json
repos:
  app:
    path: ..
    role: product
agent:
  workspace_root: .work/a2o-agent/workspaces
  required_bins:
    - git
    - go
runtime:
  kanban_status: To do
  live_ref: refs/heads/main
  max_steps: 20
  agent_attempts: 200
