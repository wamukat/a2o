schema_version: 1
package:
  name: a2o-reference-java-spring-multi-module
kanban:
  project: A2ODevSampleJava
  selection:
    status: To do
repos:
  app:
    path: ../web-app
    role: product
    label: repo:app
  lib:
    path: ../utility-lib
    role: product
    label: repo:lib
  docs:
    path: ../docs
    role: docs
    label: repo:docs
docs:
  repoSlot: docs
  root: docs
  index: docs/README.md
  categories:
    features:
      path: docs/features
      index: docs/features/README.md
    shared_specs:
      path: docs/shared-specs
      index: docs/shared-specs/README.md
    interfaces:
      path: docs/interfaces
      index: docs/interfaces/README.md
  languages:
    primary: en
    secondary:
      - ja
  policy:
    missingRoot: create
  impactPolicy:
    defaultSeverity: warning
    mirrorPolicy: require_canonical_warn_mirror
  authorities:
    greeting_api:
      source: docs/interfaces/greeting-api.md
      docs:
        - docs/interfaces/greeting-api.md
    greeting_shared_spec:
      source: docs/shared-specs/greeting-format.md
      docs:
        - docs/shared-specs/greeting-format.md
agent:
  workspace_root: .work/a2o-dev-sample/agent/workspaces
  required_bins:
    - git
    - java
    - mvn
    - ruby
runtime:
  max_steps: 30
  agent_attempts: 200
  phases:
    implementation:
      skill: skills/implementation/base.md
      executor:
        command:
          - ruby
          - "{{a2o_root_dir}}/tools/reference_validation/deterministic_worker.rb"
    review:
      skill: skills/review/default.md
      executor:
        command:
          - ruby
          - "{{a2o_root_dir}}/tools/reference_validation/deterministic_worker.rb"
    verification:
      commands:
        - app/reference-products/java-spring-multi-module/project-package/commands/verify.sh
    remediation:
      commands:
        - app/reference-products/java-spring-multi-module/project-package/commands/format.sh
    merge:
      policy: ff_only
      target_ref: refs/heads/a2o/dev-sample-live
  decomposition:
    investigate:
      command:
        - commands/investigate.rb
        - module-roles.json
    author:
      command:
        - commands/author-proposal.rb
    review:
      commands:
        - - commands/review-proposal.rb
