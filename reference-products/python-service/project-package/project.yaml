project: a2o-reference-python-service
kanban:
  provider: soloboard
  project: A2OReferencePython
  bootstrap: kanban/bootstrap.json
repos:
  app:
    path: ..
    role: product
agent:
  workspace_root: .work/a2o-agent/workspaces
  required_bins:
    - git
    - python3
runtime:
  kanban_status: To do
  live_ref: refs/heads/main
  max_steps: 20
  agent_attempts: 200
