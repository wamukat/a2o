schema_version: 1
package:
  name: a2o-reference-python-service
kanban:
  project: A2OReferencePython
  bootstrap: kanban/bootstrap.json
  selection:
    status: To do
repos:
  app:
    path: ..
    role: product
agent:
  workspace_root: .work/a2o/agent/workspaces
  required_bins:
    - git
    - python3
    - ruby
runtime:
  live_ref: refs/heads/main
  max_steps: 20
  agent_attempts: 200
  phases:
    implementation:
      skill: skills/implementation/base.md
      executor:
        command:
          - ruby
          - "{{a2o_root_dir}}/tools/reference_validation/deterministic_worker.rb"
      workspace_hook: app/project-package/commands/bootstrap.sh
    review:
      skill: skills/review/default.md
      executor:
        command:
          - ruby
          - "{{a2o_root_dir}}/tools/reference_validation/deterministic_worker.rb"
    verification:
      commands:
        - app/project-package/commands/verify.sh
    remediation:
      commands:
        - app/project-package/commands/format.sh
    merge:
      target: merge_to_live
      policy: ff_only
      target_ref: refs/heads/main
